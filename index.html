<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Simple</title>
    <style>
        /* Estilos base para limpiar márgenes y centrar todo */
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #f4f4f9;
            color: #333;
        }

        /* La sección Hero */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 80vh; /* Ocupa el 80% de la pantalla */
            padding: 20px;
        }

        /* Título principal */
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Subtítulo o descripción */
        .hero p {
            font-size: 1.2rem;
            color: #666;
            max-width: 600px;
            margin-bottom: 25px;
        }

        /* Botón de llamada a la acción (CTA) */
        .hero .btn {
            background-color: #0070f3;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Bienvenido a mi sitio web</h1>
        <p>Esta es una sección hero simple, limpia y sin complicaciones. Ideal para capturar la atención de tus visitas desde el primer segundo.</p>
        <a href="#" class="btn">Empezar ahora</a>
    </header>

</body>
</html>
